name: Build single extension

on:
  workflow_dispatch:
    inputs:
      lang:
        description: Extension language (all, en, ar, es, pt...)
        required: true
      extension:
        description: Target extension name
        required: true
      git-repo:
        description: Git repo (Optional)
        default: ''
        required: false
      git-ref:
        description: Git Ref (Optional, defaults to master)
        default: 'master'
        required: false

env:
  EXTPATH: ${{ github.event.inputs.lang }}/${{ github.event.inputs.extension }}
  EXTSLUG: ${{ github.event.inputs.lang }}:${{ github.event.inputs.extension }}
  REPO: ${{ github.event.inputs.git-repo }}

jobs:
  build-extension:
    name: Build a single extension
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check inputs
        run: |
          set -e
          if [[ -z "${{ env.REPO }}" ]]; then
            echo "REPO=${{ github.repository_owner }}/aniyomi-extensions" >> $GITHUB_ENV
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          fetch-depth: 0
          ref: ${{ github.event.inputs.git-ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Prepare signing key
        run: echo ${{ secrets.SIGNING_KEY }} | base64 -d > signingkey.jks

      - name: Run Spotless check
        run: ./gradlew -p src ${{ env.EXTSLUG }}:spotlessCheck

      - name: Build APK
        env:
          CI: false
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew -p src ${{ env.EXTSLUG }}:assembleRelease

      - name: Sign APK
        id: sign_app
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -e
          APK_PATH=$(find src/${{ env.EXTPATH }}/build/outputs/apk/release -name "*.apk" | head -1)
          SIGNED_APK="${APK_PATH%.apk}-signed.apk"

          # Find apksigner from the latest available build-tools
          BUILD_TOOLS_DIR=$(ls -d /usr/local/lib/android/sdk/build-tools/* | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS_DIR"

          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks signingkey.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$KEY_STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$APK_PATH"

          echo "signedReleaseFile=$SIGNED_APK" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.lang }}-${{ github.event.inputs.extension }}
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 3

      - name: Clean up signing key
        if: always()
        run: rm -f signingkey.jks
        